# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: 我的技术博客
subtitle: 记录学习与思考
description: 一个专注于技术分享的个人博客，涵盖编程、开发笔记、工具使用等内容。
keywords: 技术博客, 编程, 开发笔记, 前端, 后端
author: 博主
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://your-blog.vercel.app
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: 技术
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
pagination_dir: page
archive_generator:
  per_page: 20
  yearly: true
  monthly: true
  daily: false
category_generator:
  per_page: 10
tag_generator:
  per_page: 10

# Extensions
theme: butterfly

# Deployment
deploy:
  type: ''

# Search
search:
  path: search.xml
  field: post
  content: true
  format: html
