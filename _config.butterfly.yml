# =====================
# Butterfly 主题配置
# =====================

# 主题色
theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"

# 顶部导航栏
nav:
  logo: #/img/logo.png
  display_title: true
  fixed: false # fixed navigation bar

# 菜单配置
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  关于: /about/ || fas fa-user

# 社交图标
social:
  fab fa-github: https://github.com/ || Github || "#24292e"
  # fas fa-envelope: mailto:your@email.com || Email || "#4a7dbe"

# 主页配置
index:
  # 主页顶部图片
  top_img: false
  # 卡片排版
  posts_sort: date
  # 文章卡片描述类型: description / both / auto
  post_description_type: auto

# 主页文章封面
cover:
  # 是否显示文章封面
  index_enable: true
  aside_enable: true
  archives_enable: true
  # 封面显示位置 left/right/both
  position: both
  default_cover:
    - https://cdn.jsdelivr.net/gh/jerryc127/butterfly_cdn@2.1.0/top_img/cover1.webp
    - https://cdn.jsdelivr.net/gh/jerryc127/butterfly_cdn@2.1.0/top_img/cover2.webp
    - https://cdn.jsdelivr.net/gh/jerryc127/butterfly_cdn@2.1.0/top_img/cover3.webp
    - https://cdn.jsdelivr.net/gh/jerryc127/butterfly_cdn@2.1.0/top_img/cover4.webp
    - https://cdn.jsdelivr.net/gh/jerryc127/butterfly_cdn@2.1.0/top_img/cover5.webp

# 文章页配置
post_config:
  # 文章顶部图
  top_img: false
  # 文章底部相关文章
  related_post:
    enable: true
    limit: 6 # 显示推荐文章数目
    title: 相关文章
    orderby: date
    order: -1 # 1, -1

# 文章目录 TOC
toc:
  post: true
  page: false
  number: true
  expand: true
  style_simple: false # for post
  scroll_percent: true

# 文章信息
post_meta:
  page:
    date_type: both # created / updated / both
    date_format: relative # date/relative
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true

# 文章版权信息
post_copyright:
  enable: true
  decode: false
  author_href: /about
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 文章打赏
reward:
  enable: false

# 分页
pagination:
  enable: true
  type: button # bottombar / button

# 侧边栏
aside:
  enable: true
  hide: false
  button: true
  mobile: false # 移动端是否显示
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 记录学习与思考
    button:
      enable: false
  card_announcement:
    enable: false
    content: 欢迎来到我的技术博客！
  card_recent_post:
    enable: true
    limit: 5 # if set 0, will show all
    sort: date # date / updated
    sort_order: # Don't modify the setting unless you know how it works
  card_categories:
    enable: true
    limit: 8 # if set 0, will show all
    expand: none # none/true/false
    sort_order: # Don't modify the setting unless you know how it works
  card_tags:
    enable: true
    limit: 40 # if set 0, will show all
    color: true
    orderby: random
    order: 1 # 1, -1
    sort_order: # Don't modify the setting unless you know how it works
  card_archives:
    enable: true
    type: monthly # yearly or monthly
    format: MMMM YYYY # MMMM YYYY or YYYY 年 MM 月
    order: -1 # 1, -1
    limit: 8 # if set 0, will show all
    sort_order: # Don't modify the setting unless you know how it works
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order: # Don't modify the setting unless you know how it works

# 搜索
search:
  use: local_search # local_search / algolia / docsearch
  placeholder: 搜索文章...

# 本地搜索
local_search:
  enable: true
  preload: false
  CDN:

# 代码块
highlight_theme: mac # darker / pale night / light / ocean / mac / mac light / false
highlight_copy: true # copy button
highlight_lang: true # show the code language
highlight_shrink: false # true: shrink the code blocks / false: expand the code blocks
highlight_height_limit: false # unit: px

# 数学公式 (按需开启)
math:
  enable: false

# Mermaid 流程图
mermaid:
  enable: true
  theme: default

# 图片灯箱
lightbox: true

# 图片懒加载
lazyload:
  enable: true
  field: site # post / site
  placeholder:
  blur: false

# 回到顶部
back2top:
  enable: true
  fixed: true # Fixed button
  scroll_percent: true # Is it plus to display the percentage

# 阅读模式
readmode: true

# 字数统计
wordcount:
  enable: false

# 运行时间
runtimeshow:
  enable: false

# 页脚
footer:
  owner:
    enable: true
    since: 2024
  custom_text: 用心写作，认真学习
  copyright: true # Copyright of theme and framework

# 页面动画
# 不蒜子统计
busuanzi:
  web_pv_enable: false
  web_uv_enable: false
  post_pv_enable: false

# 主题颜色模式切换 (不启用暗黑模式，保持简洁)
# display_mode: light # light/dark

# PWA
pwa:
  enable: false

# CDN
CDN:
  option:

# 注入
inject:
  head:
  bottom:

# 自定义字体
font:
  global-font-size:
  code-font-size:
  font-family:
  code-font-family:
  custom_font:
    enable: false
    css:

# 水印
watermark:
  enable: false

# Snackbar (通知条)
snackbar:
  enable: false

# 复制配置
copy:
  enable: true
  copyright:
    enable: false
    limit_count: 50

# 全局通知
noticeOutdate:
  enable: false

# 文章过期提醒
noticeOutdate_post:
  enable: false

# 不蒜子
busuanzi_count:
  enable: false
